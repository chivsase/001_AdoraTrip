# =============================================================================
# AdoraTrip — Production Docker Compose Override
#
# Usage (always layer on top of base compose):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file only declares what changes from docker-compose.yml.
# Everything not listed here inherits from the base file.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Django API — production build
  #
  # IMPORTANT: 'command: null' resets the dev command set in docker-compose.yml.
  # Without this, Compose inherits the dev 'sh -c "migrate && runserver"'
  # command and passes it to the production ENTRYPOINT — running runserver
  # instead of gunicorn and migrating twice.
  #
  # With null, Docker uses the Dockerfile's CMD:
  #   ENTRYPOINT ["/entrypoint.sh"]  → runs migrate + collectstatic + superuser
  #   CMD ["gunicorn", ...]          → starts gunicorn after entrypoint completes
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production
    restart: always
    command: null            # ← CRITICAL: reset dev command; use Dockerfile CMD
    volumes:
      # Source code mount removed — the production image is self-contained.
      # Named volumes are still required: api needs to WRITE staticfiles,
      # and nginx needs to READ them from the same volume.
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Django Channels — Daphne ASGI / WebSocket
  #
  # entrypoint: "" skips the production ENTRYPOINT entirely.
  # Migrations and collectstatic are handled once by the 'api' service above.
  # Running entrypoint.sh here too would cause a race condition where both
  # services attempt 'collectstatic --clear' simultaneously.
  #
  # depends_on api: service_healthy ensures migrations are committed to the DB
  # before Daphne starts accepting WebSocket connections.
  # ---------------------------------------------------------------------------
  websocket:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production
    restart: always
    entrypoint: ""           # ← Skip entrypoint.sh; api already migrated
    volumes: []              # No source mount in prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      api:
        condition: service_healthy   # Wait for api (+ its migrations) to be healthy

  # ---------------------------------------------------------------------------
  # Celery Worker — background tasks
  # Same pattern: skip entrypoint, wait for api to be healthy first.
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production
    restart: always
    entrypoint: ""           # ← Skip entrypoint.sh
    volumes: []
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: celery -A config.celery worker --loglevel=warning --concurrency=8 -Q default,emails,payments,reports
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Celery Beat — periodic task scheduler
  # Only one instance should EVER run. 'restart: on-failure' (not always)
  # prevents a crash-loop from spawning multiple schedulers.
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: production
    restart: on-failure      # Never restart into a second instance (duplicate tasks)
    entrypoint: ""           # ← Skip entrypoint.sh
    volumes: []
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Next.js Frontend — production standalone build
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: runner          # Minimal standalone image (~200MB)
    restart: always
    volumes: []              # No source mount in prod; image is self-contained
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1

  # ---------------------------------------------------------------------------
  # PostgreSQL — production resource limits + explicit password
  # ---------------------------------------------------------------------------
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # Must be set; no fallback in prod
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ---------------------------------------------------------------------------
  # Redis — production limits + authentication
  # ---------------------------------------------------------------------------
  redis:
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Nginx — switch to production TLS config
  # ---------------------------------------------------------------------------
  nginx:
    restart: always
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # Certbot cert directory
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro

  # ---------------------------------------------------------------------------
  # Dev tools — completely disabled in production
  # ---------------------------------------------------------------------------
  flower:
    profiles:
      - disabled

  pgadmin:
    profiles:
      - disabled
