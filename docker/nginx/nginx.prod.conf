# =============================================================================
# AdoraTrip — Nginx Production Config
# TLS termination via Let's Encrypt (Certbot)
#
# Before using this file:
#   1. Obtain SSL certs: certbot certonly --standalone -d adoratrip.com -d www.adoratrip.com
#   2. Update server_name below with your actual domain
#   3. Certs are volume-mounted from /etc/letsencrypt on the host
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75;
    client_max_body_size 20M;
    server_tokens   off;    # Don't expose nginx version

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # --- Rate limiting zones ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # --- Upstreams ---
    upstream django_api {
        server api:8000;
        keepalive 32;
    }

    upstream django_websocket {
        server websocket:8001;
    }

    upstream nextjs_frontend {
        server frontend:3000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP → HTTPS redirect
    # =========================================================================
    server {
        listen 80;
        server_name adoratrip.com www.adoratrip.com;

        # Certbot ACME challenge (renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS main server
    # =========================================================================
    server {
        listen 443 ssl;
        http2  on;
        server_name adoratrip.com www.adoratrip.com;

        # --- TLS (Let's Encrypt) ---
        ssl_certificate     /etc/letsencrypt/live/adoratrip.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adoratrip.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;

        # --- Security headers ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           DENY            always;
        add_header X-Content-Type-Options    nosniff         always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # --- Static files ---
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # --- Media files (use S3/CDN in production instead) ---
        location /media/ {
            alias /app/mediafiles/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # --- WebSocket ---
        location /ws/ {
            proxy_pass http://django_websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # --- Auth endpoints — strict rate limit ---
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Stripe webhook — exempt from rate limit (Stripe controls it) ---
        location /api/v1/payments/webhook/ {
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Stripe-Signature  $http_stripe_signature;
        }

        # --- All other API routes ---
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # --- Django Admin — IP-restricted ---
        location /admin/ {
            # Restrict to trusted IPs only
            # allow YOUR_OFFICE_IP;
            # deny all;
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Health check ---
        location /api/v1/health/ {
            proxy_pass   http://django_api;
            access_log   off;
        }

        # --- Next.js frontend (everything else) ---
        location / {
            proxy_pass         http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
