# =============================================================================
# AdoraTrip — Nginx Development Config
# Reverse proxy for the full-stack: Next.js + Django API + Daphne WebSocket
#
# Routing rules:
#   /api/*             → Django API     (api:8000)
#   /admin/*           → Django admin   (api:8000)
#   /static/*          → Static files volume (served directly)
#   /media/*           → Media files volume  (served directly)
#   /ws/*              → Daphne ASGI    (websocket:8001)
#   /                  → Next.js app    (frontend:3000)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;
    server_tokens   off;    # Do not expose nginx version in headers or error pages

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml
        font/woff font/woff2
        image/webp image/avif;

    # --- Upstream servers ---
    # Django Gunicorn / runserver
    upstream django_api {
        server api:8000;
        keepalive 32;
    }

    # Daphne ASGI WebSocket server
    upstream django_websocket {
        server websocket:8001;
    }

    # Next.js dev server / standalone
    upstream nextjs_frontend {
        server frontend:3000;
        keepalive 32;
    }

    # =========================================================================
    # Main server — HTTP (development)
    # In production this block is replaced by nginx.prod.conf with TLS.
    # =========================================================================
    server {
        listen 80;
        server_name localhost;

        # --- Security headers (baseline — hardened in prod conf) ---
        add_header X-Frame-Options       SAMEORIGIN   always;
        add_header X-Content-Type-Options nosniff     always;
        add_header X-XSS-Protection      "1; mode=block" always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

        # -----------------------------------------------------------------
        # Django static files — served directly from the named volume
        # Much faster than proxying through Django
        # -----------------------------------------------------------------
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # -----------------------------------------------------------------
        # Django media uploads — served from volume (use S3 in production)
        # -----------------------------------------------------------------
        location /media/ {
            alias /app/mediafiles/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # -----------------------------------------------------------------
        # WebSocket connections — proxied to Daphne
        # -----------------------------------------------------------------
        location /ws/ {
            proxy_pass http://django_websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;   # Keep WS connections alive
        }

        # -----------------------------------------------------------------
        # Django REST API
        # proxy_http_version 1.1 is required to reuse the upstream keepalive
        # connections declared in the django_api upstream block (keepalive 32).
        # Without it nginx defaults to HTTP/1.0 which closes the connection
        # after every request and the keepalive setting has no effect.
        # -----------------------------------------------------------------
        location /api/ {
            proxy_pass            http://django_api;
            proxy_http_version    1.1;
            proxy_set_header      Connection        "";   # Clear for keepalive
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # -----------------------------------------------------------------
        # Django Admin
        # -----------------------------------------------------------------
        location /admin/ {
            proxy_pass          http://django_api;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------
        # Next.js — handles everything else (pages, _next/static, etc.)
        # _next/static chunks are served by Next.js itself in dev
        # -----------------------------------------------------------------
        location / {
            proxy_pass         http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";   # Required for HMR
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # -----------------------------------------------------------------
        # Health check endpoint (used by load balancers / uptime monitors)
        # -----------------------------------------------------------------
        location /api/v1/health/ {
            proxy_pass   http://django_api;
            access_log   off;
        }
    }
}
