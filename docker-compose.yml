version: "3.9"

# ============================================================
# AdoraTour — Development Docker Compose
# Cambodia Travel Super App
# Services: Django API + PostgreSQL + Redis + Celery + Nginx
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: adoratour_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adoratour_db}
      POSTGRES_USER: ${POSTGRES_USER:-adoratour_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adoratour_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adoratour_user} -d ${POSTGRES_DB:-adoratour_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Redis — Cache + Celery Broker + Django Channels Layer
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: adoratour_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Django Backend — API Server (Gunicorn)
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: adoratour_api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --worker-class gthread
             --threads 2
             --timeout 120
             --access-logfile -
             --error-logfile -"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${POSTGRES_USER:-adoratour_user}:${POSTGRES_PASSWORD:-adoratour_pass}@db:5432/${POSTGRES_DB:-adoratour_db}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Django Channels — ASGI WebSocket Server (Daphne)
  # ----------------------------------------------------------
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: adoratour_websocket
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${POSTGRES_USER:-adoratour_user}:${POSTGRES_PASSWORD:-adoratour_pass}@db:5432/${POSTGRES_DB:-adoratour_db}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Celery Worker — Background Jobs
  # ----------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: adoratour_celery_worker
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency=4 -Q default,emails,payments,reports
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${POSTGRES_USER:-adoratour_user}:${POSTGRES_PASSWORD:-adoratour_pass}@db:5432/${POSTGRES_DB:-adoratour_db}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Celery Beat — Scheduled Tasks / Cron
  # ----------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: adoratour_celery_beat
    restart: unless-stopped
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${POSTGRES_USER:-adoratour_user}:${POSTGRES_PASSWORD:-adoratour_pass}@db:5432/${POSTGRES_DB:-adoratour_db}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Celery Flower — Task Monitoring UI (dev only)
  # ----------------------------------------------------------
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: adoratour_flower
    restart: unless-stopped
    command: celery -A config.celery flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    ports:
      - "5555:5555"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # Nginx — Reverse Proxy + Static Files
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: adoratour_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - websocket
    networks:
      - adoratour_network

  # ----------------------------------------------------------
  # pgAdmin — Database GUI (dev only)
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: adoratour_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@adoratour.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - adoratour_network
    profiles:
      - tools

# ----------------------------------------------------------
# Volumes
# ----------------------------------------------------------
volumes:
  postgres_data:
    name: adoratour_postgres_data
  redis_data:
    name: adoratour_redis_data
  static_volume:
    name: adoratour_static
  media_volume:
    name: adoratour_media
  pgadmin_data:
    name: adoratour_pgadmin

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  adoratour_network:
    name: adoratour_network
    driver: bridge
