# =============================================================================
# AdoraTrip — Full-Stack Development Docker Compose
# Stack: Django API + Next.js Frontend + PostgreSQL + Redis + Celery + Nginx
#
# Quick start:
#   docker compose up --build
#
# With dev tools (Flower, pgAdmin):
#   docker compose --profile tools up --build
#
# Production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: adoratrip_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-adoratrip_db}
      POSTGRES_USER:     ${POSTGRES_USER:-adoratrip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adoratrip_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed script runs only on first init (empty volume)
      - ./Backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"       # Expose for local DB clients (DBeaver, TablePlus)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adoratrip_user} -d ${POSTGRES_DB:-adoratrip_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s      # Give PostgreSQL time to initialise on first boot
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache + Celery Broker + Django Channels Layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: adoratrip_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"       # Expose for local Redis clients
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s      # Redis starts fast; short grace period is enough
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Django API — Gunicorn HTTP server (REST + Admin + Docs)
  # Hot-reloads in dev via volume mount
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development        # Switch to 'production' via prod override
    container_name: adoratrip_api
    restart: unless-stopped
    # Migrate first, then start the dev server with hot-reload
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./Backend:/app           # Live reload: your code → container
      - ./Backend/logs:/app/logs  # Persist logs on host
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8000:8000"              # Direct access for dev/debug
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-adoratrip_user}:${POSTGRES_PASSWORD:-adoratrip_pass}@db:5432/${POSTGRES_DB:-adoratrip_db}
      REDIS_URL: redis://redis:6379/0
      # File-watching: poll for changes (required on Windows/NTFS → Linux containers)
      DJANGO_WATCHMAN_TIMEOUT: "0"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Django Channels — Daphne ASGI server (WebSocket / real-time)
  # ---------------------------------------------------------------------------
  websocket:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    container_name: adoratrip_websocket
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - ./Backend:/app
    ports:
      - "8001:8001"              # Direct access for WS dev/debug
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-adoratrip_user}:${POSTGRES_PASSWORD:-adoratrip_pass}@db:5432/${POSTGRES_DB:-adoratrip_db}
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Celery Worker — Background task processor
  # Queues: default, emails, payments, reports
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    container_name: adoratrip_celery_worker
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency=4 -Q default,emails,payments,reports
    volumes:
      - ./Backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-adoratrip_user}:${POSTGRES_PASSWORD:-adoratrip_pass}@db:5432/${POSTGRES_DB:-adoratrip_db}
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Celery Beat — Periodic / cron-style task scheduler
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    container_name: adoratrip_celery_beat
    # on-failure: a crash restarts Beat once. 'unless-stopped' or 'always'
    # would spin up a second instance if the first is still running, causing
    # every periodic task to fire twice. One Beat instance per cluster — always.
    restart: on-failure
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./Backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-adoratrip_user}:${POSTGRES_PASSWORD:-adoratrip_pass}@db:5432/${POSTGRES_DB:-adoratrip_db}
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Next.js Frontend — TypeScript / MUI / Tailwind
  # Hot-reloads in dev via volume mount (node_modules kept in container)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: development        # Switch to 'runner' via prod override
    container_name: adoratrip_frontend
    restart: unless-stopped
    volumes:
      - ./Frontend:/app          # Live reload: your code → container
      - ./Frontend/logs:/app/logs # Persist logs on host
      - frontend_node_modules:/app/node_modules   # Isolated node_modules
      - frontend_next_cache:/app/.next            # Persistent build cache
    ports:
      - "3000:3000"              # Direct access in dev
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      # File-watching: poll for changes (required on Windows/NTFS → Linux containers)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # Points at the internal nginx/api service name (within Docker network)
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy + Static File Server
  # Routes: / → Frontend, /api/ → Django API, /ws/ → Daphne
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: adoratrip_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      # SSL certificates mount point (populated in production)
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - websocket
      - frontend
    networks:
      - adoratrip_network

  # ---------------------------------------------------------------------------
  # Celery Flower — Task monitoring UI  [profile: tools]
  # Access: http://localhost:5555
  # ---------------------------------------------------------------------------
  flower:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    container_name: adoratrip_flower
    restart: unless-stopped
    command: celery -A config.celery flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    ports:
      - "5555:5555"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
      - celery_worker
    networks:
      - adoratrip_network
    profiles:
      - tools

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — Database GUI  [profile: tools]
  # Access: http://localhost:5050
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: adoratrip_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@adoratrip.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - adoratrip_network
    profiles:
      - tools

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    name: adoratrip_postgres_data
  redis_data:
    name: adoratrip_redis_data
  static_volume:
    name: adoratrip_static
  media_volume:
    name: adoratrip_media
  frontend_node_modules:
    name: adoratrip_frontend_node_modules
  frontend_next_cache:
    name: adoratrip_frontend_next_cache
  pgadmin_data:
    name: adoratrip_pgadmin

# =============================================================================
# Networks
# =============================================================================
networks:
  adoratrip_network:
    name: adoratrip_network
    driver: bridge
